<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RO ANALYSER KP</title>
    <!-- Lien vers le fichier CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>RO ANALYSER KP</h1>
        <p class="subtitle">Analysez vos descriptions d'incidents et identifiez la Règle d'Or correspondante (RO1–RO12).</p>

        <input type="text" id="description" placeholder="Exemple : Entrée dans une capacité sans certificat d’espace confiné">
        <button onclick="analyze()">Analyser</button>

        <!-- Loader animé -->
        <div id="loader" class="loader" style="display:none;"></div>

        <p id="result">Entrez une description et cliquez sur Analyser.</p>
    </div>

    <!-- Lien vers le fichier JS -->
    <script src="app.js"></script>
</body>
</html>
